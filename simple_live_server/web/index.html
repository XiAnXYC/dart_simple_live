<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>设备运行状态与节点监控中心</title>
  <!-- DPlayer CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ================= 伪装登录页 ================= -->
  <div id="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="shield-icon">
          <svg viewBox="0 0 24 24" width="32" height="32">
            <path fill="currentColor" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.4 0 2.5 1.1 2.5 2.5S13.4 12 12 12s-2.5-1.1-2.5-2.5S10.6 7 12 7zm0 13.9c-2.7-.8-4.7-3.2-4.9-6 1.4-.7 3.5-1.1 4.9-1.1s3.5.4 4.9 1.1c-.2 2.8-2.2 5.2-4.9 6z"/>
          </svg>
        </div>
        <h2>控制终端节点验证</h2>
        <p>Intranet Network Node Monitor Control Console</p>
      </div>
      
      <!-- 模拟服务器指标，增加欺骗性 -->
      <div class="server-status">
        <div class="status-item">
          <span>主机负载 (CPU Load)</span>
          <div class="status-bar"><div class="bar-fill CPU" style="width: 28%"></div></div>
        </div>
        <div class="status-item">
          <span>内存使用率 (RAM Usage)</span>
          <div class="status-bar"><div class="bar-fill RAM" style="width: 45%"></div></div>
        </div>
      </div>

      <form id="login-form">
        <div class="input-group">
          <label for="username">操作员账号 (Account)</label>
          <input type="text" id="username" placeholder="请输入操作员账号" required autocomplete="username">
        </div>
        <div class="input-group">
          <label for="password">终端密匙 (Access Token)</label>
          <input type="password" id="password" placeholder="请输入安全令牌密匙" required autocomplete="current-password">
        </div>
        <div id="login-error" class="error-msg"></div>
        <button type="submit" class="btn-login">鉴权并连接节点</button>
      </form>
      <div class="login-footer">
        警告：本系统仅限内网管理员登录审计。未经授权的访问将被记录。
      </div>
    </div>
  </div>

  <!-- ================= 聚合直播大厅 ================= -->
  <div id="app-container" style="display: none;">
    <!-- 侧边栏/导航 -->
    <aside class="app-sidebar">
      <div class="sidebar-brand">
        <div class="brand-logo">SL</div>
        <span class="brand-name">聚合控制台</span>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-title">直播平台</div>
        <a href="#" class="nav-item active" data-action="site" data-value="recommend">
          <span class="nav-icon">🔥</span> 精彩推荐
        </a>
        <a href="#" class="nav-item" data-action="site" data-value="bilibili">
          <span class="nav-icon">📺</span> 哔哩哔哩
        </a>
        <a href="#" class="nav-item" data-action="site" data-value="huya">
          <span class="nav-icon">🐯</span> 虎牙直播
        </a>
        <a href="#" class="nav-item" data-action="site" data-value="douyu">
          <span class="nav-icon">🐟</span> 斗鱼直播
        </a>
        <a href="#" class="nav-item" data-action="site" data-value="douyin">
          <span class="nav-icon">🎵</span> 抖音直播
        </a>

        <div class="nav-section-title">个人空间</div>
        <a href="#" class="nav-item" data-action="favorites">
          <span class="nav-icon">⭐</span> 我的关注 <span id="fav-count" class="badge">0</span>
        </a>
      </nav>

      <div class="sidebar-search">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="跨平台搜索直播间...">
          <button id="search-btn">🔍</button>
        </div>
      </div>

      <div class="sidebar-footer" style="gap: 6px;">
        <span id="user-info">admin</span>
        <button id="bili-login-btn" title="扫码登录 Bilibili" style="font-size: 11px; padding: 4px 8px; border: 1px solid var(--accent-blue); background: transparent; color: var(--accent-blue); border-radius: 6px; cursor: pointer; transition: all 0.2s;">B站登录</button>
        <button id="logout-btn" title="退出登录">退出</button>
      </div>
    </aside>

    <!-- 移动端顶部标题栏 -->
    <header class="mobile-header">
      <button id="menu-toggle-btn">☰</button>
      <h1 id="mobile-title">精彩推荐</h1>
      <button id="mobile-fav-btn">⭐</button>
    </header>

    <!-- 主体显示区 -->
    <main class="app-content">
      <!-- 平台内分类条 -->
      <div id="category-bar" class="category-scroll" style="display: none;">
        <!-- 动态生成 -->
      </div>
      <div id="sub-category-bar" class="category-scroll sub-category" style="display: none;">
        <!-- 动态生成 -->
      </div>

      <!-- 房间卡片容器 -->
      <section class="rooms-section">
        <div id="rooms-grid" class="rooms-grid">
          <!-- 动态加载房间列表 -->
        </div>
        <div id="loading-spinner" class="spinner" style="display: none;">
          <div class="double-bounce1"></div>
          <div class="double-bounce2"></div>
        </div>
        <div id="no-data" class="no-data" style="display: none;">
          暂无开播数据
        </div>
        <div id="load-more-container" class="load-more-container" style="display: none;">
          <button id="load-more-btn" class="btn-secondary">加载更多</button>
        </div>
      </section>
    </main>
  </div>

  <!-- ================= 播放模态弹窗 ================= -->
  <div id="player-modal" class="player-modal" style="display: none;">
    <div class="player-container">
      <div class="player-header">
        <div class="anchor-info">
          <img id="player-avatar" src="" alt="avatar" class="avatar">
          <div class="anchor-detail">
            <h3 id="player-title">直播中...</h3>
            <p><span id="player-anchor">主播名</span> | <span id="player-site">平台</span> | <span id="player-online">0</span>人围观</p>
          </div>
        </div>
        <div class="player-actions">
          <button id="player-fav-btn" class="btn-fav">⭐ 关注</button>
          <button id="player-close-btn" class="btn-close">×</button>
        </div>
      </div>

      <div class="player-content-wrapper">
        <!-- DPlayer 播放器容器 -->
        <div class="video-wrapper">
          <div id="dplayer"></div>
        </div>

        <!-- 弹幕列表侧边栏 (大屏显示) -->
        <div class="danmaku-sidebar">
          <div class="sidebar-header">实时弹幕</div>
          <div id="danmaku-list" class="danmaku-list">
            <!-- 动态追加弹幕消息 -->
          </div>
        </div>
      </div>

      <!-- 底部清晰度与线路切换栏 -->
      <div class="player-footer">
        <div class="quality-selector">
          <span>清晰度：</span>
          <div id="quality-buttons" class="btn-group">
            <!-- 动态清晰度按钮 -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= B站扫码登录模态框 ================= -->
  <div id="bili-qr-modal" class="player-modal" style="display: none; z-index: 1001;">
    <div class="player-container" style="max-width: 360px; height: auto; padding: 25px; align-items: center; justify-content: center; text-align: center; border-radius: 12px; background-color: var(--bg-secondary); border: 1px solid var(--border-color);">
      <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 15px; color: var(--text-main);">Bilibili 扫码登录</h3>
      <div id="bili-qr-container" style="background: white; padding: 10px; border-radius: 8px; display: inline-block; margin-bottom: 15px; width: 200px; height: 200px; position: relative;">
        <!-- 二维码图像 -->
        <img id="bili-qr-img" src="" alt="二维码" style="width: 180px; height: 180px; display: none;">
        <!-- 状态遮罩层 -->
        <div id="bili-qr-status-mask" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; border-radius: 8px;">
          加载中...
        </div>
      </div>
      <p id="bili-qr-tips" style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;">请使用手机哔哩哔哩客户端扫码登录</p>
      <div style="display: flex; gap: 12px; width: 100%;">
        <button id="bili-qr-refresh-btn" style="flex: 1; padding: 10px; background: var(--bg-tertiary); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 8px; cursor: pointer;">刷新</button>
        <button id="bili-qr-close-btn" style="flex: 1; padding: 10px; background: var(--accent-pink); border: none; color: white; border-radius: 8px; cursor: pointer;">取消</button>
      </div>

      <!-- 手动输入备用区域 -->
      <div style="margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 15px; width: 100%; text-align: left;">
        <a id="bili-toggle-manual-btn" href="#" style="color: var(--accent-blue); font-size: 12px; text-decoration: none; display: block; text-align: center;">手动输入 Cookie (备用)</a>
        <div id="bili-manual-input-area" style="display: none; margin-top: 12px;">
          <textarea id="bili-cookie-input" placeholder="请在此粘贴 SESSDATA=xxx; 等完整 Cookie..." style="width: 100%; height: 60px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 8px; color: white; padding: 8px; font-size: 11px; outline: none; resize: none; font-family: monospace;"></textarea>
          <button id="bili-save-cookie-btn" style="width: 100%; margin-top: 8px; padding: 9px; background: var(--accent-blue); border: none; color: white; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600;">保存并生效</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Hls.js & Flv.js & DPlayer CDN -->
  <script src="https://cdn.jsdelivr.net/npm/flv.js/dist/flv.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js/dist/hls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>
  <!-- App JS -->
  <script src="main.js"></script>
</body>
</html>
